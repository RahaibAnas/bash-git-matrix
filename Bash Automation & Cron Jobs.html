<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dev Workspace Hub</title>
    <link rel="shortcut icon" href="OIP.webp" type="image/x-icon">

    <style>
      
        /* ===== CSS RESET & VARIABLES ===== */
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a1f35;
            --bg-card-hover: #212845;
            --bg-code: #0d1117;
            --bg-modal: #141a2e;
            --border: #2a3150;
            --border-hover: #4f6df5;
            --text-primary: #e2e8f0;
            --text-secondary: #8892b0;
            --text-muted: #5a6380;
            --accent-blue: #4f6df5;
            --accent-cyan: #22d3ee;
            --accent-green: #34d399;
            --accent-orange: #f59e0b;
            --accent-pink: #ec4899;
            --accent-purple: #a78bfa;
            --accent-red: #ef4444;
            --accent-teal: #14b8a6;
            --glow-blue: rgba(79, 109, 245, 0.15);
            --glow-green: rgba(52, 211, 153, 0.15);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 20px;
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-modal: 0 25px 60px rgba(0, 0, 0, 0.5);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue);
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-pattern::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79, 109, 245, 0.06), transparent 70%);
            top: -100px;
            right: -100px;
            animation: floatBlob1 25s ease-in-out infinite;
        }

        .bg-pattern::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.05), transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: floatBlob2 30s ease-in-out infinite;
        }

        @keyframes floatBlob1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-80px, 60px) scale(1.1); }
            66% { transform: translate(40px, -40px) scale(0.9); }
        }

        @keyframes floatBlob2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(60px, -80px) scale(1.15); }
            66% { transform: translate(-50px, 50px) scale(0.85); }
        }

        /* ===== HEADER ===== */
        header {
            position: relative;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0;
        }

        .header-content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 15px 20px;
            text-align: center;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, rgba(79, 109, 245, 0.15), rgba(34, 211, 238, 0.1));
            border: 1px solid rgba(79, 109, 245, 0.3);
            padding: 5px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--accent-cyan);
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-badge .pulse-dot {
            width: 7px;
            height: 7px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--accent-cyan) 50%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        header .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 18px;
        }

        /* ===== SEARCH ===== */
        .search-wrapper {
            max-width: 520px;
            margin: 0 auto;
            position: relative;
        }

        .search-icon-wrap {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
            display: flex;
            align-items: center;
        }

        .search-wrapper input {
            width: 100%;
            padding: 13px 50px 13px 46px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .search-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .search-wrapper input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px var(--glow-blue);
        }

        .search-clear {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--border);
            border: none;
            color: var(--text-secondary);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 0.7rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .search-clear.visible {
            display: flex;
        }

        .search-clear:hover {
            background: var(--accent-red);
            color: #fff;
        }

        .shortcut-hint {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--border);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-family: monospace;
            pointer-events: none;
        }

        /* ===== CATEGORY FILTER ===== */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 20px 24px 6px;
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .filter-chip {
            padding: 7px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-secondary);
            font-size: 0.82rem;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-chip:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .filter-chip.active {
            background: linear-gradient(135deg, var(--accent-blue), #6366f1);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 15px rgba(79, 109, 245, 0.3);
        }

        .filter-chip .chip-count {
            background: rgba(255,255,255,0.15);
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 0.7rem;
        }

        .filter-chip.active .chip-count {
            background: rgba(255,255,255,0.25);
        }

        /* ===== STATS ===== */
        .stats-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 14px 24px 8px;
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        .stat-item .stat-num {
            color: var(--accent-cyan);
            font-weight: 700;
        }

        /* ===== COMMANDS GRID ===== */
        .grid-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 10px 24px 60px;
            position: relative;
            z-index: 1;
        }

        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 14px;
        }

        /* ===== COMMAND CARD ===== */
        .cmd-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 22px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .cmd-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cmd-card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            transform: translateY(-4px);
            box-shadow: var(--shadow-card), 0 0 30px var(--glow-blue);
        }

        .cmd-card:hover::before {
            transform: scaleX(1);
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .card-icon.cron { background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.05)); color: var(--accent-orange); }
        .card-icon.script { background: linear-gradient(135deg, rgba(79, 109, 245, 0.2), rgba(79, 109, 245, 0.05)); color: var(--accent-blue); }
        .card-icon.system { background: linear-gradient(135deg, rgba(52, 211, 153, 0.2), rgba(52, 211, 153, 0.05)); color: var(--accent-green); }
        .card-icon.file { background: linear-gradient(135deg, rgba(236, 72, 153, 0.2), rgba(236, 72, 153, 0.05)); color: var(--accent-pink); }
        .card-icon.monitor { background: linear-gradient(135deg, rgba(34, 211, 238, 0.2), rgba(34, 211, 238, 0.05)); color: var(--accent-cyan); }
        .card-icon.network { background: linear-gradient(135deg, rgba(167, 139, 250, 0.2), rgba(167, 139, 250, 0.05)); color: var(--accent-purple); }
        .card-icon.deploy { background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.05)); color: var(--accent-red); }
        .card-icon.util { background: linear-gradient(135deg, rgba(20, 184, 166, 0.2), rgba(20, 184, 166, 0.05)); color: var(--accent-teal); }

        .card-arrow {
            color: var(--text-muted);
            font-size: 1rem;
            transition: var(--transition);
            opacity: 0;
            transform: translateX(-5px);
        }

        .cmd-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(0);
            color: var(--accent-blue);
        }

        .card-name {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        .card-brief {
            font-size: 0.83rem;
            color: var(--text-secondary);
            line-height: 1.5;
            flex-grow: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .card-tag {
            padding: 3px 10px;
            background: rgba(79, 109, 245, 0.1);
            border: 1px solid rgba(79, 109, 245, 0.2);
            border-radius: 50px;
            font-size: 0.7rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-tag.cron { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.2); color: var(--accent-orange); }
        .card-tag.script { background: rgba(79, 109, 245, 0.1); border-color: rgba(79, 109, 245, 0.2); color: var(--accent-blue); }
        .card-tag.system { background: rgba(52, 211, 153, 0.1); border-color: rgba(52, 211, 153, 0.2); color: var(--accent-green); }
        .card-tag.file { background: rgba(236, 72, 153, 0.1); border-color: rgba(236, 72, 153, 0.2); color: var(--accent-pink); }
        .card-tag.monitor { background: rgba(34, 211, 238, 0.1); border-color: rgba(34, 211, 238, 0.2); color: var(--accent-cyan); }
        .card-tag.network { background: rgba(167, 139, 250, 0.1); border-color: rgba(167, 139, 250, 0.2); color: var(--accent-purple); }
        .card-tag.deploy { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
        .card-tag.util { background: rgba(20, 184, 166, 0.1); border-color: rgba(20, 184, 166, 0.2); color: var(--accent-teal); }

        .card-usage-count {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* ===== NO RESULTS ===== */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
        }

        .no-results .nr-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .no-results h3 {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .no-results p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ===== MODAL OVERLAY ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 500;
            padding: 30px 16px;
            overflow-y: auto;
        }

        .modal-overlay.open {
            display: block;
        }

        /* ===== MODAL ===== */
        .modal {
            max-width: 860px;
            margin: 0 auto 40px;
            background: var(--bg-modal);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-modal);
            animation: modalEnter 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        @keyframes modalEnter {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== MODAL HEADER ===== */
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 28px;
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-modal));
            border-bottom: 1px solid var(--border);
        }

        .modal-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .modal-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .modal-title-group h2 {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 1.5rem;
            color: var(--accent-green);
            font-weight: 700;
        }

        .modal-title-group .modal-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .modal-close {
            width: 38px;
            height: 38px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .modal-close:hover {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: #fff;
            transform: rotate(90deg);
        }

        /* ===== MODAL BODY ===== */
        .modal-body {
            padding: 28px;
        }

        .cmd-description {
            padding: 16px 18px;
            background: var(--bg-code);
            border-left: 3px solid var(--accent-blue);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.92rem;
            line-height: 1.7;
            margin-bottom: 28px;
        }

        /* ===== USAGE SECTIONS ===== */
        .usage-section {
            margin-bottom: 24px;
        }

        .usage-section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-orange);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(245, 158, 11, 0.15);
        }

        .usage-section-title .section-icon {
            width: 26px;
            height: 26px;
            background: rgba(245, 158, 11, 0.12);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        /* ===== CODE BLOCK ===== */
        .code-block {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 14px;
            overflow: hidden;
            transition: var(--transition);
        }

        .code-block:hover {
            border-color: rgba(79, 109, 245, 0.3);
        }

        .code-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: rgba(26, 31, 53, 0.6);
            border-bottom: 1px solid var(--border);
        }

        .code-label-text {
            font-size: 0.82rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .code-label-text::before {
            content: '›';
            color: var(--accent-cyan);
            font-weight: bold;
            font-size: 1rem;
        }

        .copy-btn {
            padding: 4px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-size: 0.72rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .copy-btn:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #fff;
        }

        .copy-btn.copied {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: #fff;
        }

        .code-content {
            padding: 16px;
            overflow-x: auto;
        }

        .code-content pre {
            margin: 0;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 0.88rem;
            line-height: 1.7;
            color: var(--text-primary);
            white-space: pre;
            tab-size: 4;
        }

        /* ===== SYNTAX COLORS ===== */
        .syn-comment { color: #6a737d; font-style: italic; }
        .syn-keyword { color: #ff7b72; }
        .syn-string { color: #a5d6ff; }
        .syn-variable { color: #ffa657; }
        .syn-command { color: #7ee787; }
        .syn-flag { color: #d2a8ff; }
        .syn-number { color: #79c0ff; }
        .syn-operator { color: #ff7b72; }

        /* ===== OPTIONS TABLE ===== */
        .options-section {
            margin-top: 24px;
        }

        .options-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .options-table thead th {
            background: var(--bg-secondary);
            padding: 12px 16px;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        .options-table tbody td {
            padding: 10px 16px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(42, 49, 80, 0.5);
        }

        .options-table tbody tr:last-child td {
            border-bottom: none;
        }

        .options-table tbody tr:hover {
            background: rgba(79, 109, 245, 0.05);
        }

        .options-table td:first-child {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-purple);
            font-size: 0.82rem;
            white-space: nowrap;
            font-weight: 600;
        }

        .options-table td:last-child {
            color: var(--text-secondary);
        }

        /* ===== TIP BOX ===== */
        .tip-box {
            display: flex;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(52, 211, 153, 0.06);
            border: 1px solid rgba(52, 211, 153, 0.15);
            border-radius: var(--radius-md);
            margin-top: 16px;
        }

        .tip-box .tip-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .tip-box .tip-text {
            font-size: 0.83rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .tip-box .tip-text strong {
            color: var(--accent-green);
        }

        .warning-box {

                    title: "Cron Job Monitoring",
                    items: [
                        { label: "Monitor cron job execution", code: '#!/bin/bash\n# cron_monitor.sh - Check if cron jobs ran successfully\n# Run this from a separate monitoring cron\n\ncheck_job_ran() {\n    local job_name="$1"\n    local log_file="$2"\n    local max_age_minutes="$3"\n    \n    if [ ! -f "$log_file" ]; then\n        echo "⚠ $job_name: Log file not found"\n        return 1\n    fi\n    \n    # Check if log was modified recently\n    local file_age\n    file_age=$(( ($(date +%s) - $(stat -c %Y "$log_file")) / 60 ))\n    \n    if [ "$file_age" -gt "$max_age_minutes" ]; then\n        echo "✗ $job_name: Last ran ${file_age}min ago (threshold: ${max_age_minutes}min)"\n        return 1\n    else\n        echo "✓ $job_name: Last ran ${file_age}min ago"\n        return 0\n    fi\n}\n\n# Check expected jobs\ncheck_job_ran "Backup" "/var/log/backup.log" 1500      # Should run daily\ncheck_job_ran "Sync" "/var/log/sync.log" 15            # Should run every 10min\ncheck_job_ran "Cleanup" "/var/log/cleanup.log" 10100    # Should run weekly' }
                    ]
                }
            ]
        }
    ];

    // =====================================================
    // CATEGORY CONFIG
    // =====================================================
    const categories = [
        { id: "all", label: "All", icon: "📋" },
        { id: "cron", label: "Cron & Scheduling", icon: "⏰" },
        { id: "script", label: "Bash Scripting", icon: "📜" },
        { id: "file", label: "File Automation", icon: "💾" },
        { id: "system", label: "System Tasks", icon: "⚙️" },
        { id: "monitor", label: "Monitoring", icon: "📊" },
        { id: "network", label: "Network", icon: "🌐" },
        { id: "deploy", label: "Deployment", icon: "🚀" },
        { id: "util", label: "Utilities", icon: "🔧" }
    ];

    // =====================================================
    // STATE
    // =====================================================
    let activeCategory = "all";
    let searchQuery = "";

    // =====================================================
    // RENDER FUNCTIONS
    // =====================================================

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function countUsages(cmd) {
        if (!cmd.usages) return 0;
        return cmd.usages.reduce((sum, s) => sum + s.items.length, 0);
    }

    function getFilteredCommands() {
        let filtered = commandsData;
        if (activeCategory !== "all") {
            filtered = filtered.filter(c => c.category === activeCategory);
        }
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            filtered = filtered.filter(c =>
                c.name.toLowerCase().includes(q) ||
                c.brief.toLowerCase().includes(q) ||
                c.category.toLowerCase().includes(q) ||
                (c.description && c.description.toLowerCase().includes(q))
            );
        }
        return filtered;
    }

    function renderFilterBar() {
        const bar = document.getElementById("filterBar");
        bar.innerHTML = categories.map(cat => {
            const count = cat.id === "all" ? commandsData.length : commandsData.filter(c => c.category === cat.id).length;
            return `<span class="filter-chip ${cat.id === activeCategory ? 'active' : ''}" data-cat="${cat.id}">
                ${cat.icon} ${cat.label}
                <span class="chip-count">${count}</span>
            </span>`;
        }).join("");
    }

    function renderStats(filtered) {
        const total = commandsData.length;
        const totalUsages = commandsData.reduce((s, c) => s + countUsages(c), 0);
        document.getElementById("statsRow").innerHTML = `
            <span class="stat-item">Showing <span class="stat-num">${filtered.length}</span> of <span class="stat-num">${total}</span> topics</span>
            <span class="stat-item">|</span>
            <span class="stat-item"><span class="stat-num">${totalUsages}</span> total examples</span>
        `;
    }

    function renderGrid(filtered) {
        const grid = document.getElementById("commandsGrid");

        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-results">
                <div class="nr-icon">🔍</div>
                <h3>No commands found</h3>
                <p>Try adjusting your search or category filter</p>
            </div>`;
            return;
        }

        grid.innerHTML = filtered.map(cmd => `
            <div class="cmd-card" data-id="${cmd.id}" onclick="openModal('${cmd.id}')">
                <div class="card-top">
                    <div class="card-icon ${cmd.category}">${cmd.icon}</div>
                    <span class="card-arrow">→</span>
                </div>
                <div class="card-name">${cmd.name}</div>
                <div class="card-brief">${cmd.brief}</div>
                <div class="card-footer">
                    <span class="card-tag ${cmd.category}">${cmd.category}</span>
                    <span class="card-usage-count">${countUsages(cmd)} examples</span>
                </div>
            </div>
        `).join("");
    }

    function render() {
        const filtered = getFilteredCommands();
        renderFilterBar();
        renderStats(filtered);
        renderGrid(filtered);
    }

    // =====================================================
    // MODAL
    // =====================================================

    function openModal(id) {
        const cmd = commandsData.find(c => c.id === id);
        if (!cmd) return;

        // Header
        document.getElementById("modalHeader").innerHTML = `
            <div class="modal-header-left">
                <div class="modal-icon card-icon ${cmd.category}">${cmd.icon}</div>
                <div class="modal-title-group">
                    <h2>${cmd.name}</h2>
                    <div class="modal-subtitle">${cmd.category} • ${countUsages(cmd)} examples</div>
                </div>
            </div>
            <button class="modal-close" onclick="closeModal()">✕</button>
        `;

        // Body
        let html = "";

        if (cmd.description) {
            html += `<div class="cmd-description">${cmd.description}</div>`;
        }

        if (cmd.usages) {
            cmd.usages.forEach(section => {
                html += `<div class="usage-section">
                    <div class="usage-section-title">
                        <span class="section-icon">▸</span>
                        ${section.title}
                    </div>`;

                section.items.forEach(item => {
                    const codeId = "c_" + Math.random().toString(36).substr(2, 8);
                    html += `<div class="code-block">
                        <div class="code-label">
                            <span class="code-label-text">${item.label}</span>
                            <button class="copy-btn" onclick="copyCode('${codeId}', this)">
                                📋 Copy
                            </button>
                        </div>
                        <div class="code-content">
                            <pre id="${codeId}">${escapeHtml(item.code)}</pre>
                        </div>
                    </div>`;
                });

                html += `</div>`;
            });
        }

        if (cmd.options) {
            html += `<div class="usage-section options-section">
                <div class="usage-section-title">
                    <span class="section-icon">⚙</span>
                    Options & Parameters Reference
                </div>
                <table class="options-table">
                    <thead><tr><th>Option</th><th>Description</th></tr></thead>
                    <tbody>
                        ${cmd.options.map(([opt, desc]) => `<tr><td>${escapeHtml(opt)}</td><td>${desc}</td></tr>`).join("")}
                    </tbody>
                </table>
            </div>`;
        }

        if (cmd.tips) {
            html += `<div class="tip-box">
                <span class="tip-icon">💡</span>
                <div class="tip-text">
                    <strong>Pro Tips:</strong><br>
                    ${cmd.tips.map(t => `• ${t}`).join("<br>")}
                </div>
            </div>`;
        }

        document.getElementById("modalBody").innerHTML = html;
        document.getElementById("modalOverlay").classList.add("open");
        document.body.style.overflow = "hidden";
    }

    function closeModal() {
        document.getElementById("modalOverlay").classList.remove("open");
        document.body.style.overflow = "";
    }

    function copyCode(id, btn) {
        const text = document.getElementById(id).textContent;
        navigator.clipboard.writeText(text).then(() => {
            btn.innerHTML = "✓ Copied!";
            btn.classList.add("copied");
            setTimeout(() => {
                btn.innerHTML = "📋 Copy";
                btn.classList.remove("copied");
            }, 2000);
        });
    }

    // =====================================================
    // EVENT LISTENERS
    // =====================================================

    // Search
    const searchInput = document.getElementById("searchInput");
    const searchClear = document.getElementById("searchClear");
    const shortcutHint = document.getElementById("shortcutHint");

    searchInput.addEventListener("input", () => {
        searchQuery = searchInput.value.trim();
        searchClear.classList.toggle("visible", searchQuery.length > 0);
        shortcutHint.style.display = searchQuery.length > 0 ? "none" : "block";
        render();
    });

    searchClear.addEventListener("click", () => {
        searchInput.value = "";
        searchQuery = "";
        searchClear.classList.remove("visible");
        shortcutHint.style.display = "block";
        render();
        searchInput.focus();
    });

    // Keyboard shortcut: / to focus search
    document.addEventListener("keydown", (e) => {
        if (e.key === "/" && document.activeElement !== searchInput) {
            e.preventDefault();
            searchInput.focus();
        }
        if (e.key === "Escape") {
            if (document.getElementById("modalOverlay").classList.contains("open")) {
                closeModal();
            } else {
                searchInput.value = "";
                searchQuery = "";
                searchClear.classList.remove("visible");
                shortcutHint.style.display = "block";
                searchInput.blur();
                render();
            }
        }
    });

    // Filter chips
    document.getElementById("filterBar").addEventListener("click", (e) => {
        const chip = e.target.closest(".filter-chip");
        if (chip) {
            activeCategory = chip.dataset.cat;
            render();
        }
    });

    // Modal close
    document.getElementById("modalOverlay").addEventListener("click", (e) => {
        if (e.target === document.getElementById("modalOverlay")) {
            closeModal();
        }
    });

    // Back to top
    const backTop = document.getElementById("backTop");
    window.addEventListener("scroll", () => {
        backTop.classList.toggle("show", window.scrollY > 400);
    });
    backTop.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
    });

    // =====================================================
    // INITIALIZE
    // =====================================================
    render();

    </script>
</body>
</html>
