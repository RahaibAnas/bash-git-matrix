<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bash Workspace Hub</title>
    <link rel="shortcut icon" href="OIP.webp" type="image/x-icon">

    <style>
        /* ===== INTER-CONNECTIVITY TOP NAV BAR ===== */
        .global-nav-wrapper {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            /* Keeps it above headers */
        }

        .global-nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .global-nav-logo {
            color: #58a6ff;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .global-nav-links {
            display: flex;
            gap: 8px;
        }

        .global-nav-item {
            padding: 6px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #8b949e;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .global-nav-item:hover {
            border-color: #58a6ff;
            color: #c9d1d9;
            background: #1f6feb11;
        }

        .global-nav-item.current-hub {
            background: #1f6feb;
            color: #ffffff;
            border-color: #1f6feb;
            box-shadow: 0 0 12px rgba(31, 111, 235, 0.3);
        }

        /* ===== CSS RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #161b22 0%, #1a2332 100%);
            border-bottom: 1px solid #30363d;
            padding: 40px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 2.2rem;
            color: #58a6ff;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header h1 .git-icon {
            width: 42px;
            height: 42px;
            background: #f05032;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 16px;
            color: white;
        }

        .header p {
            color: #8b949e;
            font-size: 1rem;
        }

        /* ===== SEARCH BAR ===== */
        .search-container {
            max-width: 600px;
            margin: 20px auto 0;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #c9d1d9;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .search-container .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b949e;
            font-size: 1.1rem;
        }

        /* ===== CATEGORY FILTERS ===== */
        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .filter-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid #30363d;
            background: #161b22;
            color: #8b949e;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #1f6feb;
            color: #ffffff;
            border-color: #1f6feb;
        }

        /* ===== COMMANDS GRID ===== */
        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== COMMAND CARD ===== */
        .command-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .command-card:hover {
            border-color: #58a6ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(88, 166, 255, 0.1);
        }

        .command-card.active {
            border-color: #58a6ff;
            box-shadow: 0 4px 20px rgba(88, 166, 255, 0.15);
        }

        .card-header {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header .cmd-name {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.15rem;
            font-weight: 700;
            color: #7ee787;
        }

        .card-header .category-badge {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-setup {
            background: #1a3a2a;
            color: #3fb950;
        }

        .badge-basic {
            background: #1a2a3a;
            color: #58a6ff;
        }

        .badge-branch {
            background: #3a2a1a;
            color: #d29922;
        }

        .badge-remote {
            background: #3a1a2a;
            color: #f778ba;
        }

        .badge-history {
            background: #2a1a3a;
            color: #bc8cff;
        }

        .badge-undo {
            background: #3a1a1a;
            color: #f85149;
        }

        .badge-stash {
            background: #1a3a3a;
            color: #39d0d8;
        }

        .badge-tag {
            background: #2a3a1a;
            color: #9be54a;
        }

        .badge-config {
            background: #3a3a1a;
            color: #e3b341;
        }

        .badge-github {
            background: #1a1a3a;
            color: #79c0ff;
        }

        .badge-advanced {
            background: #2a1a1a;
            color: #ff7b72;
        }

        .card-header .toggle-icon {
            font-size: 1.2rem;
            color: #8b949e;
            transition: transform 0.3s ease;
            margin-left: 10px;
        }

        .command-card.active .toggle-icon {
            transform: rotate(180deg);
            color: #58a6ff;
        }

        .card-description {
            padding: 0 20px;
            color: #8b949e;
            font-size: 0.88rem;
            padding-bottom: 15px;
        }

        /* ===== EXPANDED CONTENT ===== */
        .card-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
            background: #0d1117;
            border-top: 1px solid transparent;
        }

        .command-card.active .card-details {
            max-height: 2000px;
            border-top-color: #30363d;
        }

        .usage-section {
            padding: 20px;
        }

        .usage-section h4 {
            color: #58a6ff;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .usage-item {
            margin-bottom: 16px;
            padding: 14px;
            background: #161b22;
            border-radius: 8px;
            border-left: 3px solid #30363d;
            transition: border-color 0.3s;
        }

        .usage-item:hover {
            border-left-color: #58a6ff;
        }

        .usage-item .usage-cmd {
            font-family: 'Courier New', Courier, monospace;
            color: #7ee787;
            font-size: 0.9rem;
            background: #0d1117;
            padding: 8px 12px;
            border-radius: 5px;
            display: block;
            margin-bottom: 8px;
            word-break: break-all;
            position: relative;
        }

        .usage-item .usage-cmd .copy-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .usage-item .usage-cmd:hover .copy-btn {
            opacity: 1;
        }

        .usage-item .usage-cmd .copy-btn:hover {
            background: #30363d;
            color: #c9d1d9;
        }

        .usage-item .usage-desc {
            color: #8b949e;
            font-size: 0.83rem;
            padding-left: 2px;
        }

        .usage-item .usage-desc strong {
            color: #c9d1d9;
        }

        /* ===== MODAL / OVERLAY ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 14px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            position: sticky;
            top: 0;
            background: #161b22;
            padding: 25px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
        }

        .modal-header .cmd-title {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            color: #7ee787;
            font-weight: 700;
        }

        .modal-header .close-btn {
            background: none;
            border: 1px solid #30363d;
            color: #8b949e;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .modal-header .close-btn:hover {
            background: #21262d;
            color: #f85149;
            border-color: #f85149;
        }

        .modal-body {
            padding: 25px;
        }

        .modal-body .desc {
            color: #8b949e;
            margin-bottom: 25px;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .modal-body .usage-group {
            margin-bottom: 20px;
        }

        .modal-body .usage-group h4 {
            color: #d29922;
            font-size: 0.9rem;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #21262d;
        }

        /* ===== SCROLL TO TOP ===== */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #1f6feb;
            color: white;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .scroll-top:hover {
            background: #58a6ff;
            transform: translateY(-3px);
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            text-align: center;
            padding: 10px;
            color: #484f58;
            font-size: 0.8rem;
        }

        .stats-bar span {
            color: #58a6ff;
            font-weight: 600;
        }

        /* ===== NO RESULTS ===== */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #484f58;
        }

        .no-results .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .no-results p {
            font-size: 1.1rem;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid #21262d;
            color: #484f58;
            font-size: 0.85rem;
            margin-top: 40px;
        }

        .footer a {
            color: #58a6ff;
            text-decoration: none;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        /* ===== TOOLTIP ===== */
        .tooltip {
            position: fixed;
            background: #1f6feb;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .tooltip.show {
            opacity: 1;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .commands-grid {
                grid-template-columns: 1fr;
                padding: 15px;
            }

            .modal-content {
                max-height: 90vh;
            }

            .modal-header .cmd-title {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 25px 15px;
            }

            .header h1 {
                font-size: 1.3rem;
                flex-direction: column;
            }

            .filters {
                padding: 15px;
            }

            .filter-btn {
                font-size: 0.75rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>

<body>

    <nav class="global-nav-wrapper">
        <div class="global-nav-container">
            <div class="global-nav-logo">🐧 <span>Bash Workspace Hub</span></div>
            <div class="global-nav-links">
                <a href="Bash Commands Reference.html" class="global-nav-item ">📁 Core Commands</a>
                <a href="Bash Scripting Reference.html" class="global-nav-item">📜 Bash Scripting</a>
                <a href="Bash Automation & Cron Jobs.html" class="global-nav-item ">⏰ Automation & Cron</a>
                <a href="git and github.html" class="global-nav-item current-hub">🚀 Git & github</a>

            </div>
        </div>
    </nav>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <h1>
            <span class="git-icon">G</span>
            Git & GitHub Commands Reference
        </h1>
        <p>Click any command to explore all its usages and options</p>
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search commands... (e.g., commit, branch, merge)">
        </div>
    </header>

    <!-- ===== CATEGORY FILTERS ===== -->
    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All Commands</button>
        <button class="filter-btn" data-filter="setup">Setup</button>
        <button class="filter-btn" data-filter="basic">Basic</button>
        <button class="filter-btn" data-filter="branch">Branching</button>
        <button class="filter-btn" data-filter="remote">Remote</button>
        <button class="filter-btn" data-filter="history">History</button>
        <button class="filter-btn" data-filter="undo">Undo</button>
        <button class="filter-btn" data-filter="stash">Stash</button>
        <button class="filter-btn" data-filter="tag">Tags</button>
        <button class="filter-btn" data-filter="advanced">Advanced</button>
        <button class="filter-btn" data-filter="github">GitHub</button>
        <button class="filter-btn" data-filter="config">Config</button>
    </div>

    <!-- ===== STATS ===== -->
    <div class="stats-bar">
        Showing <span id="commandCount">0</span> commands
    </div>

    <!-- ===== COMMANDS GRID ===== -->
    <div class="commands-grid" id="commandsGrid">
        <!-- Cards will be dynamically generated -->
    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <div class="modal-header">
                <span class="cmd-title" id="modalTitle"></span>
                <button class="close-btn" id="closeModal">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- ===== TOOLTIP ===== -->
    <div class="tooltip" id="tooltip">Copied!</div>

    <!-- ===== SCROLL TO TOP ===== -->
    <button class="scroll-top" id="scrollTop">↑</button>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <p>Built with ❤️ for developers | Git & GitHub Commands & Concepts Reference</p>
    </footer>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // ===== ALL GIT COMMANDS DATA =====
        const gitCommands = [
            // ===== SETUP =====
            {
                name: "git init",
                category: "setup",
                description: "Initialize a new Git repository in the current directory.",
                usages: [
                    { cmd: "git init", desc: "Create a new Git repository in the current folder" },
                    { cmd: "git init <directory>", desc: "Create a new Git repository in the specified directory" },
                    { cmd: "git init --bare", desc: "Create a bare repository (no working directory, used for remote repos)" },
                    { cmd: "git init --bare --shared", desc: "Create a shared bare repository for team collaboration" },
                    { cmd: "git init -b main", desc: "Initialize with 'main' as the default branch name" },
                    { cmd: "git init --template=<template-dir>", desc: "Initialize using a custom template directory" }
                ]
            },
            {
                name: "git clone",
                category: "setup",
                description: "Clone a repository into a new directory.",
                usages: [
                    { cmd: "git clone <url>", desc: "Clone a repository from a URL" },
                    { cmd: "git clone <url> <directory>", desc: "Clone into a specific directory name" },
                    { cmd: "git clone --depth 1 <url>", desc: "Shallow clone — only the latest commit (faster)" },
                    { cmd: "git clone --branch <branch> <url>", desc: "Clone a specific branch only" },
                    { cmd: "git clone --single-branch <url>", desc: "Clone only one branch (default branch)" },
                    { cmd: "git clone --recurse-submodules <url>", desc: "Clone and initialize all submodules" },
                    { cmd: "git clone --mirror <url>", desc: "Create a mirror clone (bare + all refs)" },
                    { cmd: "git clone --shallow-since=2023-01-01 <url>", desc: "Shallow clone since a specific date" },
                    { cmd: "git clone git@github.com:user/repo.git", desc: "Clone using SSH" },
                    { cmd: "git clone https://github.com/user/repo.git", desc: "Clone using HTTPS" }
                ]
            },
            // ===== BASIC =====
            {
                name: "git add",
                category: "basic",
                description: "Add file contents to the staging area (index).",
                usages: [
                    { cmd: "git add <file>", desc: "Stage a specific file" },
                    { cmd: "git add .", desc: "Stage all changes in current directory and subdirectories" },
                    { cmd: "git add -A", desc: "Stage all changes (new, modified, deleted) in entire repo" },
                    { cmd: "git add --all", desc: "Same as -A — stage everything" },
                    { cmd: "git add *.js", desc: "Stage all JavaScript files (using wildcard)" },
                    { cmd: "git add -p", desc: "Interactively stage parts (hunks) of files" },
                    { cmd: "git add -p <file>", desc: "Interactively stage parts of a specific file" },
                    { cmd: "git add -u", desc: "Stage only modified and deleted files (not new ones)" },
                    { cmd: "git add -n <file>", desc: "Dry run — show what would be added without actually adding" },
                    { cmd: "git add --force <file>", desc: "Force add an ignored file" },
                    { cmd: "git add -i", desc: "Open interactive staging mode" }
                ]
            },
            {
                name: "git commit",
                category: "basic",
                description: "Record changes to the repository with a message.",
                usages: [
                    { cmd: 'git commit -m "message"', desc: "Commit staged changes with a message" },
                    { cmd: 'git commit -am "message"', desc: "Stage all tracked files and commit in one step" },
                    { cmd: "git commit --amend", desc: "Modify the most recent commit (opens editor)" },
                    { cmd: 'git commit --amend -m "new message"', desc: "Change the last commit message" },
                    { cmd: "git commit --amend --no-edit", desc: "Amend last commit without changing the message" },
                    { cmd: "git commit --allow-empty -m \"msg\"", desc: "Create an empty commit (useful for CI triggers)" },
                    { cmd: "git commit -v", desc: "Show diff in the commit message editor" },
                    { cmd: "git commit --dry-run", desc: "Show what would be committed without committing" },
                    { cmd: "git commit --signoff", desc: "Add a Signed-off-by line to the commit" },
                    { cmd: "git commit -S", desc: "GPG sign the commit" },
                    { cmd: 'git commit --date="2024-01-01" -m "msg"', desc: "Commit with a custom date" }
                ]
            },
            {
                name: "git status",
                category: "basic",
                description: "Show the working tree status.",
                usages: [
                    { cmd: "git status", desc: "Show full status of working directory and staging area" },
                    { cmd: "git status -s", desc: "Short format status output" },
                    { cmd: "git status --short", desc: "Same as -s — compact output" },
                    { cmd: "git status -b", desc: "Show branch info in short format" },
                    { cmd: "git status --ignored", desc: "Show ignored files as well" },
                    { cmd: "git status -uno", desc: "Don't show untracked files" },
                    { cmd: "git status --porcelain", desc: "Machine-readable output (for scripts)" }
                ]
            },
            {
                name: "git diff",
                category: "basic",
                description: "Show changes between commits, working tree, and staging area.",
                usages: [
                    { cmd: "git diff", desc: "Show unstaged changes in working directory" },
                    { cmd: "git diff --staged", desc: "Show changes staged for the next commit" },
                    { cmd: "git diff --cached", desc: "Same as --staged" },
                    { cmd: "git diff HEAD", desc: "Show all changes since last commit (staged + unstaged)" },
                    { cmd: "git diff <branch1> <branch2>", desc: "Compare two branches" },
                    { cmd: "git diff <commit1> <commit2>", desc: "Compare two commits" },
                    { cmd: "git diff <file>", desc: "Show changes for a specific file" },

                    { cmd: "git submodule foreach git pull", desc: "Pull latest changes in all submodules" },

            },
            {
                name: "git worktree",

                usages: [

                    { cmd: "git worktree list", desc: "List all linked worktrees" },
                    { cmd: "git worktree remove <path>", desc: "Remove a worktree" },
                    { cmd: "git worktree prune", desc: "Clean up stale worktree info" }

            },
            {
                name: "git archive",
                category: "advanced",
                description: "Create an archive of files from a named tree.",
                usages: [
                    { cmd: "git archive --format=zip HEAD > project.zip", desc: "Create a ZIP archive of current HEAD" },
                    { cmd: "git archive --format=tar HEAD > project.tar", desc: "Create a TAR archive" },
                    { cmd: "git archive --format=zip --output=v1.0.zip v1.0", desc: "Archive a specific tag" },
                    { cmd: "git archive HEAD --prefix=project/ > project.tar", desc: "Archive with a prefix directory" }
                ]
            },
            {
                name: "git grep",
                category: "advanced",
                description: "Search for patterns in tracked files.",
                usages: [
                    { cmd: "git grep \"search term\"", desc: "Search for a string in tracked files" },
                    { cmd: "git grep -n \"term\"", desc: "Search with line numbers" },
                    { cmd: "git grep -c \"term\"", desc: "Count matches per file" },
                    { cmd: "git grep \"term\" <commit>", desc: "Search in a specific commit" },
                    { cmd: "git grep -i \"term\"", desc: "Case-insensitive search" },
                    { cmd: "git grep --heading \"term\"", desc: "Group results by file" }
                ]
            },
            // ===== GITHUB SPECIFIC =====
            {
                name: "GitHub: Fork & PR",
                category: "github",
                description: "Fork repositories and create Pull Requests on GitHub.",
                usages: [
                    { cmd: "# Fork via GitHub UI", desc: "Click 'Fork' button on the repository page" },
                    { cmd: "git clone <your-fork-url>", desc: "Clone your forked repository" },
                    { cmd: "git remote add upstream <original-url>", desc: "Add original repo as 'upstream' remote" },
                    { cmd: "git fetch upstream", desc: "Fetch changes from original repository" },
                    { cmd: "git merge upstream/main", desc: "Merge upstream changes into your branch" },
                    { cmd: "git rebase upstream/main", desc: "Rebase your work onto upstream changes" },
                    { cmd: "git push origin <feature-branch>", desc: "Push feature branch to your fork" },
                    { cmd: "# Create PR via GitHub UI", desc: "Click 'New Pull Request' on GitHub" },
                    { cmd: "gh pr create --title \"Title\" --body \"Desc\"", desc: "Create PR using GitHub CLI" },
                    { cmd: "gh pr list", desc: "List open pull requests (GitHub CLI)" },
                    { cmd: "gh pr merge <number>", desc: "Merge a pull request (GitHub CLI)" },
                    { cmd: "gh pr checkout <number>", desc: "Check out a PR locally (GitHub CLI)" }
                ]
            },
            {
                name: "GitHub: SSH Setup",
                category: "github",
                description: "Set up SSH keys for GitHub authentication.",
                usages: [
                    { cmd: "ssh-keygen -t ed25519 -C \"your@email.com\"", desc: "Generate a new SSH key" },
                    { cmd: "ssh-keygen -t rsa -b 4096 -C \"your@email.com\"", desc: "Generate RSA SSH key (legacy)" },
                    { cmd: "eval \"$(ssh-agent -s)\"", desc: "Start the SSH agent" },
                    { cmd: "ssh-add ~/.ssh/id_ed25519", desc: "Add SSH key to the agent" },
                    { cmd: "cat ~/.ssh/id_ed25519.pub", desc: "Display public key (copy to GitHub)" },
                    { cmd: "# Add key in GitHub → Settings → SSH Keys", desc: "Paste your public key on GitHub" },
                    { cmd: "ssh -T git@github.com", desc: "Test SSH connection to GitHub" },
                    { cmd: "git remote set-url origin git@github.com:user/repo.git", desc: "Switch remote URL to SSH" }
                ]
            },
            {
                name: "GitHub: Actions",
                category: "github",
                description: "GitHub Actions CI/CD workflow concepts and files.",
                usages: [
                    { cmd: "mkdir -p .github/workflows", desc: "Create the workflows directory" },
                    { cmd: "# Create .github/workflows/ci.yml", desc: "Create a workflow YAML file" },
                    { cmd: "on: [push, pull_request]", desc: "Trigger workflow on push or PR" },
                    { cmd: "on:\n  push:\n    branches: [main]", desc: "Trigger only on push to main" },
                    { cmd: "runs-on: ubuntu-latest", desc: "Specify the runner OS" },
                    { cmd: "uses: actions/checkout@v4", desc: "Use the checkout action" },
                    { cmd: "uses: actions/setup-node@v4", desc: "Use the Node.js setup action" },
                    { cmd: "gh run list", desc: "List workflow runs (GitHub CLI)" },
                    { cmd: "gh run view <run-id>", desc: "View a specific workflow run" },
                    { cmd: "gh workflow run <workflow>", desc: "Manually trigger a workflow" }
                ]
            },
            {
                name: "GitHub: gh CLI",
                category: "github",
                description: "GitHub CLI (gh) common commands for interacting with GitHub.",
                usages: [
                    { cmd: "gh auth login", desc: "Authenticate with GitHub" },
                    { cmd: "gh auth status", desc: "Check authentication status" },
                    { cmd: "gh repo create <name>", desc: "Create a new repository" },
                    { cmd: "gh repo create <name> --public", desc: "Create a public repository" },
                    { cmd: "gh repo create <name> --private", desc: "Create a private repository" },
                    { cmd: "gh repo clone <owner/repo>", desc: "Clone a repository" },
                    { cmd: "gh repo fork <owner/repo>", desc: "Fork a repository" },
                    { cmd: "gh repo view", desc: "View repository details" },
                    { cmd: "gh issue create --title \"Bug\" --body \"Details\"", desc: "Create an issue" },
                    { cmd: "gh issue list", desc: "List repository issues" },
                    { cmd: "gh issue close <number>", desc: "Close an issue" },
                    { cmd: "gh pr create", desc: "Create a pull request interactively" },
                    { cmd: "gh pr list", desc: "List pull requests" },
                    { cmd: "gh pr review <number> --approve", desc: "Approve a pull request" },
                    { cmd: "gh release create <tag>", desc: "Create a new release" },
                    { cmd: "gh gist create <file>", desc: "Create a gist from a file" },
                    { cmd: "gh api repos/<owner>/<repo>", desc: "Make a GitHub API request" }
                ]
            },
            {
                name: "GitHub: Pages",
                category: "github",
                description: "Deploy static websites using GitHub Pages.",
                usages: [
                    { cmd: "# Settings → Pages → Source", desc: "Enable GitHub Pages in repo settings" },
                    { cmd: "# Select branch: main, folder: / or /docs", desc: "Choose source branch and folder" },
                    { cmd: "git checkout -b gh-pages", desc: "Create a gh-pages branch for deployment" },
                    { cmd: "# Push to gh-pages branch", desc: "GitHub auto-deploys from gh-pages" },
                    { cmd: "# URL: https://<user>.github.io/<repo>", desc: "Access your deployed site" },
                    { cmd: "# Add custom domain in Settings → Pages", desc: "Configure a custom domain" }
                ]
            }
        ];

        // ===== DOM ELEMENTS =====
        const commandsGrid = document.getElementById('commandsGrid');
        const searchInput = document.getElementById('searchInput');
        const filters = document.getElementById('filters');
        const commandCount = document.getElementById('commandCount');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const closeModal = document.getElementById('closeModal');
        const scrollTopBtn = document.getElementById('scrollTop');
        const tooltip = document.getElementById('tooltip');

        let activeFilter = 'all';

        // ===== RENDER COMMAND CARDS =====
        function renderCommands(filter = 'all', search = '') {
            let filtered = gitCommands;

            if (filter !== 'all') {
                filtered = filtered.filter(cmd => cmd.category === filter);
            }

            if (search) {
                const term = search.toLowerCase();
                filtered = filtered.filter(cmd =>
                    cmd.name.toLowerCase().includes(term) ||
                    cmd.description.toLowerCase().includes(term) ||
                    cmd.usages.some(u =>
                        u.cmd.toLowerCase().includes(term) ||
                        u.desc.toLowerCase().includes(term)
                    )
                );
            }

            commandCount.textContent = filtered.length;

            if (filtered.length === 0) {
                commandsGrid.innerHTML = `
                    <div class="no-results">
                        <div class="icon">🔍</div>
                        <p>No commands found matching your search.</p>
                    </div>
                `;
                return;
            }

            commandsGrid.innerHTML = filtered.map((cmd, index) => `
                <div class="command-card" data-index="${gitCommands.indexOf(cmd)}" onclick="openModal(${gitCommands.indexOf(cmd)})">
                    <div class="card-header">
                        <span class="cmd-name">${escapeHtml(cmd.name)}</span>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span class="category-badge badge-${cmd.category}">${cmd.category}</span>
                            <span class="toggle-icon">▶</span>
                        </div>
                    </div>
                    <div class="card-description">${escapeHtml(cmd.description)}</div>
                </div>
            `).join('');
        }

        // ===== OPEN MODAL =====
        function openModal(index) {
            const cmd = gitCommands[index];
            modalTitle.textContent = cmd.name;

            let usagesHtml = `
                <p class="desc">${escapeHtml(cmd.description)}</p>
                <h4>📋 All Usages & Options</h4>
            `;

            cmd.usages.forEach(usage => {
                usagesHtml += `
                    <div class="usage-item">
                        <code class="usage-cmd">
                            ${escapeHtml(usage.cmd)}
                            <button class="copy-btn" onclick="event.stopPropagation(); copyToClipboard('${escapeAttr(usage.cmd)}', this)">📋 Copy</button>
                        </code>
                        <div class="usage-desc">${escapeHtml(usage.desc)}</div>
                    </div>
                `;
            });

            modalBody.innerHTML = usagesHtml;
            modalOverlay.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        // ===== CLOSE MODAL =====
        function closeModalFn() {
            modalOverlay.classList.remove('show');
            document.body.style.overflow = '';
        }

        closeModal.addEventListener('click', closeModalFn);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModalFn();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModalFn();
        });

        // ===== COPY TO CLIPBOARD =====
        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '✅ Copied!';
                btn.style.opacity = '1';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.opacity = '';
                }, 1500);
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = '✅ Copied!';
                setTimeout(() => {
                    btn.textContent = '📋 Copy';
                }, 1500);
            });
        }

        // ===== FILTERS =====
        filters.addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                activeFilter = e.target.dataset.filter;
                renderCommands(activeFilter, searchInput.value);
            }
        });

        // ===== SEARCH =====
        searchInput.addEventListener('input', (e) => {
            renderCommands(activeFilter, e.target.value);
        });

        // ===== SCROLL TO TOP =====
        window.addEventListener('scroll', () => {
            if (window.scrollY > 400) {
                scrollTopBtn.classList.add('visible');
            } else {
                scrollTopBtn.classList.remove('visible');
            }
        });

        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ===== HELPER FUNCTIONS =====
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function escapeAttr(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n');
        }

        // ===== KEYBOARD SHORTCUT =====
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // ===== INITIALIZE =====
        renderCommands();
    </script>
</body>
