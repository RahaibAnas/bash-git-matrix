<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dev Workspace Hub</title>
    <link rel="shortcut icon" href="OIP.webp" type="image/x-icon">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pg-blue: #58a6ff;
            --pg-blue-dark: #0d1117;
            --pg-blue-light: #388bfd;
            --pg-orange: #f0883e;
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-card-hover: #21262d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --text-muted: #6b7394;
            --border-color: #30363d;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --info: #60a5fa;
            --purple: #a78bfa;
            --cyan: #22d3ee;
            --code-bg: #090d16;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
           background-color: #1a1e30;   /* Put your custom hex color here */
        border-bottom: 2px solid #0067bb;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header h1 .pg-logo {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            color: var(--pg-blue);
        }

        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 0.95rem;
        }

        

        /* Search & Filter */
        .controls {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 18px 12px 44px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--pg-blue-light);
            box-shadow: 0 0 0 3px rgba(74, 137, 185, 0.2);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .filter-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-btn:hover {
            border-color: var(--pg-blue-light);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--pg-blue);
            border-color: var(--pg-blue);
            color: white;
        }

        .stats-bar {
            max-width: 1200px;
            margin: 0 auto 10px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-bar span {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Commands Grid */
        .commands-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px 20px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }

        .command-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .command-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--pg-blue), var(--pg-blue-light));
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .command-card:hover {
            border-color: var(--pg-blue-light);
            background: var(--bg-card-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(51, 103, 145, 0.15);
        }

        .command-card:hover::before {
            transform: scaleX(1);
        }

        .command-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--pg-blue-light);
            margin-bottom: 6px;
            font-family: 'Courier New', monospace;
        }

        .command-brief {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .command-category {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cat-ddl { background: rgba(167,139,250,0.15); color: var(--purple); }
        .cat-dml { background: rgba(74,222,128,0.15); color: var(--success); }
        .cat-dcl { background: rgba(251,191,36,0.15); color: var(--warning); }
        .cat-tcl { background: rgba(248,113,113,0.15); color: var(--danger); }
        .cat-query { background: rgba(96,165,250,0.15); color: var(--info); }
        .cat-admin { background: rgba(232,144,62,0.15); color: var(--pg-orange); }
        .cat-utility { background: rgba(34,211,238,0.15); color: var(--cyan); }
        .cat-psql { background: rgba(255,255,255,0.1); color: var(--text-secondary); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 20px;
            overflow-y: auto;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 18px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            padding: 24px 28px 18px;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: sticky;
            top: 0;
            background: var(--bg-card);
            border-radius: 18px 18px 0 0;
            z-index: 10;
        }

        .modal-header-left h2 {
            font-size: 1.6rem;
            font-family: 'Courier New', monospace;
            color: var(--pg-blue-light);
            margin-bottom: 4px;
        }

        .modal-header-left .modal-brief {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .modal-close:hover {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        .modal-body {
            padding: 24px 28px 28px;
        }

        .usage-section {
            margin-bottom: 28px;
        }

        .usage-section:last-child {
            margin-bottom: 0;
        }

        .usage-section h3 {
            font-size: 1rem;
            color: var(--pg-orange);
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .usage-section h3 .section-icon {
            font-size: 0.9rem;
        }

        .syntax-block {
            background: var(--code-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 12px;
            overflow-x: auto;
            position: relative;
        }

        .syntax-block code {
            font-family: 'Courier New', Consolas, monospace;
            font-size: 0.88rem;
            line-height: 1.7;
            white-space: pre;
            color: var(--text-primary);
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0;
        }

        .syntax-block:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background: var(--pg-blue);
            color: white;
            border-color: var(--pg-blue);
        }

        .copy-btn.copied {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .example-item {
            margin-bottom: 16px;
        }

        .example-item .example-label {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .note-box {
            background: rgba(96,165,250,0.08);
            border-left: 3px solid var(--info);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            margin-top: 10px;
        }

        .note-box p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .tip-box {
            background: rgba(74,222,128,0.08);
            border-left: 3px solid var(--success);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            margin-top: 10px;
        }

        .tip-box p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .warning-box {
            background: rgba(251,191,36,0.08);
            border-left: 3px solid var(--warning);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            margin-top: 10px;
        }

        .warning-box p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Syntax Highlighting */
        .kw { color: #c792ea; font-weight: 600; }
        .fn { color: #82aaff; }
        .str { color: #c3e88d; }
        .num { color: #f78c6c; }
        .cm { color: #546e7a; font-style: italic; }
        .type { color: #ffcb6b; }
        .op { color: #89ddff; }
        .var { color: #f07178; }
        .tbl { color: #80cbc4; }
        .col { color: #e4e8f1; }

        /* Options table */
        .options-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            font-size: 0.85rem;
        }

        .options-table th {
            text-align: left;
            padding: 8px 12px;
            background: var(--code-bg);
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
        }

        .options-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .options-table td:first-child {
            font-family: 'Courier New', monospace;
            color: var(--pg-blue-light);
            white-space: nowrap;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .no-results .big-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .no-results p {
            font-size: 1.1rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--pg-blue);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .commands-grid {
                grid-template-columns: 1fr;
            }

            .modal {
                margin: 10px;
                max-height: 95vh;
            }

            .modal-header {
                padding: 18px 20px 14px;
            }

            .modal-body {
                padding: 18px 20px 22px;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }

            .filter-buttons {
                width: 100%;
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 4px;
            }

            .filter-btn {
                flex-shrink: 0;
            }
        }

        /* Back to top */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--pg-blue);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            z-index: 50;
        }

        .back-to-top:hover {
            background: var(--pg-blue-light);
            transform: translateY(-2px);
        }

        .back-to-top.visible {
            display: flex;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <h1>
                <span class="pg-logo">🐘</span>
                PostgreSQL Commands & Concepts Reference
            </h1>
            <p>Click on any command to explore its full usage, syntax, and examples</p>
        </div>
    </header>

    <div class="controls">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search commands... (e.g., SELECT, CREATE, INDEX)">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="ddl">DDL</button>
            <button class="filter-btn" data-filter="dml">DML</button>
            <button class="filter-btn" data-filter="dcl">DCL</button>
            <button class="filter-btn" data-filter="tcl">TCL</button>
            <button class="filter-btn" data-filter="query">Query</button>
            <button class="filter-btn" data-filter="admin">Admin</button>
            <button class="filter-btn" data-filter="utility">Utility</button>
            <button class="filter-btn" data-filter="psql">psql</button>
        </div>
    </div>

    <div class="stats-bar">
        <span id="resultCount"></span>
        <span id="categoryLabel"></span>
    </div>

    <div class="commands-grid" id="commandsGrid">
        <!-- Cards injected by JS -->
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <div class="modal-header-left">
                    <h2 id="modalTitle"></h2>
                    <span class="modal-brief" id="modalBrief"></span>
                </div>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <button class="back-to-top" id="backToTop">↑</button>

<script>
// ─── PostgreSQL Commands Data ────────────────────────────────────────────────
const commands = [
    // ═══ DDL ═══
    {
        name: "CREATE TABLE",
        brief: "Create a new table in the database",
        category: "ddl",
        content: {
            sections: [
                {
                    title: "📝 Basic Syntax",
                    type: "syntax",
                    code: `<span class="kw">CREATE TABLE</span> <span class="tbl">table_name</span> (
    <span class="col">column1</span> <span class="type">data_type</span> <span class="kw">constraints</span>,
    <span class="col">column2</span> <span class="type">data_type</span> <span class="kw">constraints</span>,
    ...
);`
                },
                {
                    title: "🔧 Examples",
                    type: "examples",
                    items: [
                        {
                            label: "Simple table with constraints",
                            code: `<span class="kw">CREATE TABLE</span> <span class="tbl">employees</span> (
    <span class="col">id</span>         <span class="type">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    <span class="col">name</span>       <span class="type">VARCHAR(100)</span> <span class="kw">NOT NULL</span>,
    <span class="col">email</span>      <span class="type">VARCHAR(255)</span> <span class="kw">UNIQUE</span>,
    <span class="col">salary</span>     <span class="type">NUMERIC(10,2)</span> <span class="kw">DEFAULT</span> <span class="num">0.00</span>,
    <span class="col">dept_id</span>    <span class="type">INTEGER</span> <span class="kw">REFERENCES</span> <span class="tbl">departments</span>(<span class="col">id</span>),
    <span class="col">created_at</span> <span class="type">TIMESTAMP</span> <span class="kw">DEFAULT</span> <span class="fn">CURRENT_TIMESTAMP</span>
);`
                        },
                        {
                            label: "Table with composite primary key",
                            code: `<span class="kw">CREATE TABLE</span> <span class="tbl">order_items</span> (
    <span class="col">order_id</span>   <span class="type">INTEGER</span> <span class="kw">REFERENCES</span> <span class="tbl">orders</span>(<span class="col">id</span>),
    <span class="col">product_id</span> <span class="type">INTEGER</span> <span class="kw">REFERENCES</span> <span class="tbl">products</span>(<span class="col">id</span>),
    <span class="col">quantity</span>   <span class="type">INTEGER</span> <span class="kw">NOT NULL CHECK</span> (<span class="col">quantity</span> <span class="op">></span> <span class="num">0</span>),
    <span class="kw">PRIMARY KEY</span> (<span class="col">order_id</span>, <span class="col">product_id</span>)
);`
                        },
                        {
                            label: "Create table if it doesn't exist",
                            code: `<span class="kw">CREATE TABLE IF NOT EXISTS</span> <span class="tbl">logs</span> (
    <span class="col">id</span>       <span class="type">BIGSERIAL</span> <span class="kw">PRIMARY KEY</span>,
    <span class="col">level</span>    <span class="type">VARCHAR(10)</span>,
    <span class="col">message</span>  <span class="type">TEXT</span>,
    <span class="col">log_time</span> <span class="type">TIMESTAMPTZ</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>()
);`
                        },
                        {
                            label: "Partitioned table (Range)",
                            code: `<span class="kw">CREATE TABLE</span> <span class="tbl">sales</span> (
    <span class="col">id</span>        <span class="type">SERIAL</span>,
    <span class="col">sale_date</span> <span class="type">DATE</span> <span class="kw">NOT NULL</span>,
    <span class="col">amount</span>    <span class="type">NUMERIC</span>
) <span class="kw">PARTITION BY RANGE</span> (<span class="col">sale_date</span>);

<span class="kw">CREATE TABLE</span> <span class="tbl">sales_2024_q1</span> <span class="kw">PARTITION OF</span> <span class="tbl">sales</span>
    <span class="kw">FOR VALUES FROM</span> (<span class="str">'2024-01-01'</span>) <span class="kw">TO</span> (<span class="str">'2024-04-01'</span>);`
                        }
                    ]
                },
                {
                    title: "📊 Common Data Types",
                    type: "table",
                    headers: ["Type", "Description"],
                    rows: [
                        ["SERIAL / BIGSERIAL", "Auto-incrementing integer"],
                        ["INTEGER / BIGINT", "Whole numbers"],
                        ["NUMERIC(p,s)", "Exact decimal numbers"],
                        ["VARCHAR(n) / TEXT", "Variable-length strings"],
                        ["BOOLEAN", "true / false"],
                        ["DATE / TIMESTAMP", "Date and time"],
                        ["TIMESTAMPTZ", "Timestamp with timezone"],
                        ["JSON / JSONB", "JSON data (JSONB is binary)"],
                        ["UUID", "Universally unique identifier"],
                        ["ARRAY", "Array of any type"]
                    ]
                },
                {
                    title: "💡 Tips",
                    type: "tip",
                    text: "Prefer BIGSERIAL over SERIAL for large tables. Use TEXT instead of VARCHAR when you don't need a length limit. Use TIMESTAMPTZ for timezone-aware applications."
                }
            ]
        }
    },
    {
        name: "ALTER TABLE",
        brief: "Modify an existing table structure",
        category: "ddl",
        content: {
            sections: [
                {
                    title: "📝 Basic Syntax",
                    type: "syntax",
                    code: `<span class="kw">ALTER TABLE</span> <span class="tbl">table_name</span> <span class="kw">action</span>;`
                },
                {
                    title: "🔧 Examples",
                    type: "examples",
                    items: [
                        {
                            label: "Add a column",
                            code: `<span class="kw">ALTER TABLE</span> <span class="tbl">employees</span>
    <span class="kw">ADD COLUMN</span> <span class="col">phone</span> <span class="type">VARCHAR(20)</span>;`
                        },
                        {
                            label: "Drop a column",
                            code: `<span class="kw">ALTER TABLE</span> <span class="tbl">employees</span>
    <span class="kw">DROP COLUMN</span> <span class="col">phone</span>;`
                        },
                        {
                            label: "Rename a column",
                            code: `<span class="kw">ALTER TABLE</span> <span class="tbl">employees</span>
    <span class="kw">RENAME COLUMN</span> <span class="col">name</span> <span class="kw">TO</span> <span class="col">full_name</span>;`
                        },
                        {

                    items: [

                            label: "Upsert by unique column",

<span class="kw">ON CONFLICT</span> (<span class="col">key</span>)

                        },

                            label: "Upsert with condition",
                            code: `<span class="kw">INSERT INTO</span> <span class="tbl">products</span> (<span class="col">sku</span>, <span class="col">price</span>, <span class="col">updated_at</span>)

<span class="kw">ON CONFLICT</span> (<span class="col">sku</span>)
<span class="kw">DO UPDATE SET</span>
    <span class="col">price</span> <span class="op">=</span> <span class="kw">EXCLUDED</span>.<span class="col">price</span>,
    <span class="col">updated_at</span> <span class="op">=</span> <span class="kw">EXCLUDED</span>.<span class="col">updated_at</span>
<span class="kw">WHERE</span> <span class="tbl">products</span>.<span class="col">price</span> <span class="op">!=</span> <span class="kw">EXCLUDED</span>.<span class="col">price</span>;`
                        },

<span class="kw">VALUES</span> (<span class="num">1</span>, <span class="num">42</span>)
<span class="kw">ON CONFLICT</span> (<span class="col">user_id</span>, <span class="col">post_id</span>)
<span class="kw">DO NOTHING</span>;`

    {
        name: "BEGIN / COMMIT / ROLLBACK",
        brief: "Transaction control statements",
        category: "tcl",
        content: {
            sections: [
                {
                    title: "📝 Syntax",
                    type: "syntax",
                    code: `<span class="kw">BEGIN</span>;               <span class="cm">-- Start transaction</span>
    <span class="cm">-- SQL statements</span>
<span class="kw">COMMIT</span>;              <span class="cm">-- Save changes</span>
<span class="kw">ROLLBACK</span>;            <span class="cm">-- Undo changes</span>

<span class="kw">SAVEPOINT</span> <span class="col">name</span>;      <span class="cm">-- Create savepoint</span>
<span class="kw">ROLLBACK TO</span> <span class="col">name</span>;   <span class="cm">-- Rollback to savepoint</span>
<span class="kw">RELEASE</span> <span class="col">name</span>;       <span class="cm">-- Destroy savepoint</span>`
                },
                {
                    title: "🔧 Examples",
                    type: "examples",
                    items: [
                        {
                            label: "Basic transaction",
                            code: `<span class="kw">BEGIN</span>;

<span class="kw">UPDATE</span> <span class="tbl">accounts</span> <span class="kw">SET</span> <span class="col">balance</span> <span class="op">=</span> <span class="col">balance</span> <span class="op">-</span> <span class="num">500</span> <span class="kw">WHERE</span> <span class="col">id</span> <span class="op">=</span> <span class="num">1</span>;
<span class="kw">UPDATE</span> <span class="tbl">accounts</span> <span class="kw">SET</span> <span class="col">balance</span> <span class="op">=</span> <span class="col">balance</span> <span class="op">+</span> <span class="num">500</span> <span class="kw">WHERE</span> <span class="col">id</span> <span class="op">=</span> <span class="num">2</span>;

<span class="kw">COMMIT</span>;</span>`
                        },
                        {
                            label: "Transaction with savepoint",
                            code: `<span class="kw">BEGIN</span>;

<span class="kw">INSERT INTO</span> <span class="tbl">orders</span> (<span class="col">customer_id</span>, <span class="col">total</span>) <span class="kw">VALUES</span> (<span class="num">1</span>, <span class="num">100</span>);

<span class="kw">SAVEPOINT</span> <span class="col">before_items</span>;

<span class="kw">INSERT INTO</span> <span class="tbl">order_items</span> (<span class="col">order_id</span>, <span class="col">product_id</span>) <span class="kw">VALUES</span> (<span class="num">1</span>, <span class="num">999</span>);
<span class="cm">-- Oops, product doesn't exist</span>
<span class="kw">ROLLBACK TO</span> <span class="col">before_items</span>;

<span class="kw">INSERT INTO</span> <span class="tbl">order_items</span> (<span class="col">order_id</span>, <span class="col">product_id</span>) <span class="kw">VALUES</span> (<span class="num">1</span>, <span class="num">42</span>);

<span class="kw">COMMIT</span>;`
                        },
                        {
                            label: "Transaction isolation level",
                            code: `<span class="kw">BEGIN TRANSACTION ISOLATION LEVEL</span> <span class="col">SERIALIZABLE</span>;
<span class="cm">-- ... statements ...</span>
<span class="kw">COMMIT</span>;

<span class="cm">-- Levels: READ COMMITTED (default), REPEATABLE READ, SERIALIZABLE</span>`
                        }
                    ]
                },
                {
                    title: "📌 Note",
                    type: "note",
                    text: "PostgreSQL uses READ COMMITTED isolation by default. Each statement in a transaction sees a snapshot of the database. Savepoints allow partial rollback within a transaction."
                }
            ]
        }
    },

                    items: [

                            label: "Auto-update timestamp trigger",
                            code: `<span class="cm">-- 1. Create the trigger function</span>
<span class="kw">CREATE OR REPLACE FUNCTION</span> <span class="fn">update_modified</span>()
<span class="kw">RETURNS TRIGGER AS</span> <span class="str">$$</span>
<span class="kw">BEGIN</span>

<span class="kw">END</span>;
<span class="str">$$</span> <span class="kw">LANGUAGE</span> <span class="col">plpgsql</span>;

<span class="cm">-- 2. Attach to table</span>

<span class="kw">EXECUTE FUNCTION</span> <span class="fn">update_modified</span>();`

// ─── Render Cards ────────────────────────────────────────────────────────────
const grid = document.getElementById('commandsGrid');
const searchInput = document.getElementById('searchInput');
const filterBtns = document.querySelectorAll('.filter-btn');
const resultCount = document.getElementById('resultCount');
const categoryLabel = document.getElementById('categoryLabel');
const modalOverlay = document.getElementById('modalOverlay');
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modalTitle');
const modalBrief = document.getElementById('modalBrief');
const modalBody = document.getElementById('modalBody');
const modalClose = document.getElementById('modalClose');
const backToTop = document.getElementById('backToTop');

let activeFilter = 'all';

function getCategoryLabel(cat) {
    const labels = {
        ddl: 'DDL', dml: 'DML', dcl: 'DCL', tcl: 'TCL',
        query: 'Query', admin: 'Admin', utility: 'Utility', psql: 'psql'
    };
    return labels[cat] || cat;
}

function renderCards() {
    const search = searchInput.value.toLowerCase().trim();
    const filtered = commands.filter(cmd => {
        const matchFilter = activeFilter === 'all' || cmd.category === activeFilter;
        const matchSearch = !search ||
            cmd.name.toLowerCase().includes(search) ||
            cmd.brief.toLowerCase().includes(search);
        return matchFilter && matchSearch;
    });

    if (filtered.length === 0) {
        grid.innerHTML = `
            <div class="no-results">
                <div class="big-icon">🔍</div>
                <p>No commands found matching your search.</p>
            </div>`;
    } else {
        grid.innerHTML = filtered.map((cmd, idx) => `
            <div class="command-card" data-index="${commands.indexOf(cmd)}" tabindex="0">
                <div class="command-name">${cmd.name}</div>
                <div class="command-brief">${cmd.brief}</div>
                <span class="command-category cat-${cmd.category}">${getCategoryLabel(cmd.category)}</span>
            </div>
        `).join('');
    }

    resultCount.textContent = `${filtered.length} command${filtered.length !== 1 ? 's' : ''}`;
    categoryLabel.textContent = activeFilter === 'all' ? 'All Categories' : getCategoryLabel(activeFilter).toUpperCase();
}

// ─── Event Listeners ─────────────────────────────────────────────────────────
searchInput.addEventListener('input', renderCards);

filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderCards();
    });
});

grid.addEventListener('click', e => {
    const card = e.target.closest('.command-card');
    if (!card) return;
    const idx = parseInt(card.dataset.index);
    openModal(commands[idx]);
});

grid.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        const card = e.target.closest('.command-card');
        if (card) {
            const idx = parseInt(card.dataset.index);
            openModal(commands[idx]);
        }
    }
});

function openModal(cmd) {
    modalTitle.textContent = cmd.name;
    modalBrief.textContent = cmd.brief;

    let html = '';
    cmd.content.sections.forEach(section => {
        html += `<div class="usage-section">`;

        if (section.title) {
            html += `<h3>${section.title}</h3>`;
        }

        if (section.type === 'syntax') {
            html += `
                <div class="syntax-block">
                    <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                    <code>${section.code}</code>
                </div>`;
        }

        if (section.type === 'examples') {
            section.items.forEach(item => {
                html += `
                    <div class="example-item">
                        <div class="example-label">${item.label}</div>
                        <div class="syntax-block">
                            <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                            <code>${item.code}</code>
                        </div>
                    </div>`;
            });
        }

        if (section.type === 'table') {
            html += `<table class="options-table">
                <thead><tr>${section.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
                <tbody>
                    ${section.rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}
                </tbody>
            </table>`;
        }

        if (section.type === 'note') {
            html += `<div class="note-box"><p>📌 ${section.text}</p></div>`;
        }

        if (section.type === 'tip') {
            html += `<div class="tip-box"><p>💡 ${section.text}</p></div>`;
        }

        if (section.type === 'warning') {
            html += `<div class="warning-box"><p>⚠️ ${section.text}</p></div>`;
        }

        html += `</div>`;
    });

    modalBody.innerHTML = html;
    modalOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    modalOverlay.classList.remove('active');
    document.body.style.overflow = '';
}

modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => {
    if (e.target === modalOverlay) closeModal();
});
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});

// ─── Copy Code ───────────────────────────────────────────────────────────────
function copyCode(btn) {
    const codeEl = btn.parentElement.querySelector('code');
    const text = codeEl.textContent || codeEl.innerText;
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
        }, 2000);
    });
}

// ─── Back to Top ─────────────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
    backToTop.classList.toggle('visible', window.scrollY > 400);
});

backToTop.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ─── Keyboard shortcut: focus search ─────────────────────────────────────────
document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
    }
});

// ─── Initial Render ──────────────────────────────────────────────────────────
renderCards();
</script>
